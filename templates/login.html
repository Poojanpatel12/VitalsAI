<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VitalsAI — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:28px;font-weight:700;color:#2b6cb0}.logo h1 span{color:#e53e3e}
.logo p{font-size:13px;color:#718096;margin-top:4px}
.tabs{display:flex;border-radius:10px;background:#f0f4f8;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#718096;transition:.2s}
.tab.active{background:#fff;color:#2b6cb0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#4a5568;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;transition:.2s}
.form-group input:focus{outline:none;border-color:#667eea}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn:hover{opacity:.9}
.divider{text-align:center;color:#a0aec0;font-size:13px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e2e8f0}
.divider::before{left:0}.divider::after{right:0}
.google-btn{width:100%;padding:11px;border:1.5px solid #e2e8f0;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.google-btn:hover{background:#f7fafc}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.msg.error{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.msg.success{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.form-panel{display:none}.form-panel.active{display:block}
.forgot{text-align:right;font-size:12px;color:#667eea;cursor:pointer;margin-top:-8px;margin-bottom:14px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>Vitals<span>AI</span></h1>
    <p>Intelligent Disease Prediction System</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <div id="msg" class="msg"></div>

  <!-- Login -->
  <div id="login-panel" class="form-panel active">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <div class="forgot" onclick="showForgot()">Forgot password?</div>
    <button class="btn" onclick="login()">Login</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- Signup -->
  <div id="signup-panel" class="form-panel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Poojan Patel">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-pass" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="••••••••">
    </div>
    <button class="btn" onclick="signup()">Create Account</button>
    <div class="divider">or</div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
  document.getElementById('login-panel').classList.toggle('active', tab==='login');
  document.getElementById('signup-panel').classList.toggle('active', tab==='signup');
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text; el.className = `msg ${type}`; el.style.display = 'block';
}
function hideMsg() { document.getElementById('msg').style.display = 'none'; }

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email || !pass) return showMsg('Please fill all fields', 'error');
  try {
    const res  = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password: pass})});
    const data = await res.json();
    if (data.success) { showMsg('Login successful! Redirecting...', 'success'); setTimeout(()=>window.location.href='/', 1000); }
    else showMsg(data.error || 'Login failed', 'error');
  } catch(e) { showMsg('Server error', 'error'); }
}

async function signup() {
  const name    = document.getElementById('signup-name').value.trim();
  const email   = document.getElementById('signup-email').value.trim();
  const pass    = document.getElementById('signup-pass').value;
  const confirm = document.getElementById('signup-confirm').value;
  if (!name||!email||!pass) return showMsg('Please fill all fields', 'error');
  if (pass !== confirm) return showMsg('Passwords do not match', 'error');
  if (pass.length < 6) return showMsg('Password must be at least 6 characters', 'error');
  try {
    const res  = await fetch('/api/signup', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, email, password: pass})});
    const data = await res.json();
    if (data.success) { showMsg('Account created! Please login.', 'success'); setTimeout(()=>switchTab('login'), 1500); }
    else showMsg(data.error || 'Signup failed', 'error');
  } catch(e) { showMsg('Server error', 'error'); }
}

function googleLogin() { window.location.href = '/auth/google'; }
function showForgot() { showMsg('Password reset email sent! (Demo)', 'success'); }

// Show error if Google login failed
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'google_failed') {
    showMsg('Google login failed. Please try again.', 'error');
}

// Enter key support
document.addEventListener('keydown', e => { if(e.key==='Enter') { document.getElementById('login-panel').classList.contains('active') ? login() : signup(); }});
</script>
</body>
</html>
