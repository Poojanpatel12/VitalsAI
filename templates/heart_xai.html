<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VitalsAI — Heart Disease (XAI)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#1a202c}
nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:#2b6cb0}.logo span{color:#e53e3e}
.nav-links a{text-decoration:none;color:#4a5568;font-size:13px;padding:6px 12px;border-radius:20px;margin-left:4px}
.nav-links a:hover,.nav-links a.active{background:#2b6cb0;color:#fff}

.hero{background:linear-gradient(135deg,#e53e3e,#c53030);padding:40px 40px;color:#fff}
.hero h1{font-size:24px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.hero p{font-size:13px;opacity:.85}

.main{max-width:1200px;margin:28px auto;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.full{grid-column:1/-1}

/* Input form */
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card h2{font-size:17px;font-weight:700;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.fg label{display:block;font-size:12px;font-weight:600;color:#4a5568;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px}
.fg input:focus,.fg select:focus{outline:none;border-color:#e53e3e}
.btn-predict{width:100%;padding:13px;background:linear-gradient(135deg,#e53e3e,#c53030);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.btn-predict:hover{opacity:.9}

/* Result section */
.result-box{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.07);display:none}
.result-box.show{display:block}

/* Risk indicator */
.risk-indicator{text-align:center;margin-bottom:24px;padding:20px;border-radius:12px;background:#f0f4f8}
.risk-level{font-size:28px;font-weight:800;margin-bottom:8px}
.risk-level.high{color:#e53e3e}
.risk-level.medium{color:#f59e0b}
.risk-level.low{color:#10b981}
.risk-prob{font-size:14px;color:#718096}

/* Explanation boxes */
.exp-section{margin-bottom:24px;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
.exp-section h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.exp-section.high{border-left:4px solid #e53e3e;background:#fff5f5}
.exp-section.high h3{color:#e53e3e}
.exp-section.low{border-left:4px solid #10b981;background:#f0fdf4}
.exp-section.low h3{color:#10b981}
.exp-list{list-style:none}
.exp-list li{padding:8px 0;font-size:13px;line-height:1.6;color:#4a5568;border-bottom:1px solid rgba(0,0,0,.05)}
.exp-list li:last-child{border-bottom:none}
.exp-list li::before{content:'→ ';color:#2b6cb0;font-weight:600;margin-right:8px}

/* Feature importance */
.features{margin-bottom:24px}
.features h3{font-size:14px;font-weight:700;margin-bottom:12px}
.feature-item{margin-bottom:12px}
.feature-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#4a5568;margin-bottom:4px}
.feature-bar{width:100%;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.feature-bar-fill{height:100%;background:linear-gradient(90deg,#e53e3e,#f59e0b);border-radius:4px;transition:width .3s}

/* Suggestions */
.suggestions{background:#fff5f5;border:1px solid #fed7d7;border-radius:12px;padding:16px;margin-bottom:24px}
.suggestions h3{font-size:14px;font-weight:700;color:#e53e3e;margin-bottom:10px}
.sug-list{list-style:none}
.sug-list li{padding:8px 0;font-size:13px;color:#744210;border-bottom:1px solid rgba(0,0,0,.05)}
.sug-list li:last-child{border-bottom:none}
.sug-list li::before{content:'✓ ';color:#dc2626;font-weight:700;margin-right:6px}

/* Lifestyle changes */
.lifestyle{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:16px}
.lifestyle h3{font-size:14px;font-weight:700;color:#10b981;margin-bottom:12px}
.lifestyle-cat{margin-bottom:12px}
.lifestyle-cat strong{font-size:12px;color:#047857}
.lifestyle-cat ul{list-style:none;padding-left:12px;margin-top:6px}
.lifestyle-cat li{font-size:12px;color:#15803d;padding:4px 0}

.loading{display:none;text-align:center;padding:20px}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#e53e3e;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>
<nav>
  <div class="logo">Vitals<span>AI</span></div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/heart" class="active">❤️ Heart</a>
    <a href="/brain">🧠 Brain</a>
    <a href="/diabetes">🩺 Diabetes</a>
    <a href="/kidney">🫘 Kidney</a>
    <a href="/eye">👁️ Eye</a>
  </div>
</nav>

<div class="hero">
  <h1>❤️ Heart Disease Prediction (XAI)</h1>
  <p>Explainable AI - જાણો કે HIGH/LOW Risk કેમ આવ્યો</p>
</div>

<div class="main">
  <!-- Input Form -->
  <div class="card">
    <h2>📋 Patient Information</h2>
    <div class="form-grid">
      <div class="fg"><label>Age</label><input type="number" id="age" placeholder="e.g. 45" min="1" max="120"></div>
      <div class="fg"><label>BMI</label><input type="number" id="bmi" placeholder="e.g. 26.5" step="0.1"></div>
      <div class="fg"><label>High Blood Pressure?</label>
        <select id="highbp"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="fg"><label>High Cholesterol?</label>
        <select id="highchol"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="fg"><label>Diabetes?</label>
        <select id="diabetes"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="fg"><label>Smoker?</label>
        <select id="smoker"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="fg"><label>Physical Activity?</label>
        <select id="phys"><option value="1">Yes</option><option value="0">No</option></select>
      </div>
      <div class="fg"><label>General Health</label>
        <select id="genhlth">
          <option value="1">Excellent</option>
          <option value="2">Very Good</option>
          <option value="3">Good</option>
          <option value="4">Fair</option>
          <option value="5">Poor</option>
        </select>
      </div>
      <div class="fg"><label>Sex</label>
        <select id="sex"><option value="0">Female</option><option value="1">Male</option></select>
      </div>
    </div>
    <button class="btn-predict" onclick="predictHeart()">🔮 Predict Heart Disease Risk</button>
  </div>

  <!-- Results (Dynamic) -->
  <div class="result-box" id="result">
    <div class="risk-indicator" id="risk-ind"></div>
    
    <div id="exp-high" class="exp-section high"></div>
    <div id="exp-low" class="exp-section low"></div>
    
    <div class="features">
      <h3>📊 Top Contributing Factors (Feature Importance)</h3>
      <div id="features"></div>
    </div>
    
    <div id="suggestions" class="suggestions"></div>
    <div id="lifestyle" class="lifestyle"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Analyzing your health data...</p>
  </div>
</div>

<script>
async function predictHeart() {
  const data = {
    Age: parseInt(document.getElementById('age').value)||45,
    BMI: parseFloat(document.getElementById('bmi').value)||25,
    HighBP: parseInt(document.getElementById('highbp').value),
    HighChol: parseInt(document.getElementById('highchol').value),
    Diabetes: parseInt(document.getElementById('diabetes').value),
    Smoker: parseInt(document.getElementById('smoker').value),
    PhysActivity: parseInt(document.getElementById('phys').value),
    GenHlth: parseInt(document.getElementById('genhlth').value),
    Sex: parseInt(document.getElementById('sex').value)
  };
  
  document.getElementById('loading').style.display = 'block';
  
  try {
    const res = await fetch('/api/predict/heart', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    displayResult(result);
    
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function displayResult(result) {
  const riskLevel = result.risk.split(' ')[0].toLowerCase();
  
  // Risk indicator
  const riskInd = document.getElementById('risk-ind');
  riskInd.innerHTML = `
    <div class="risk-level ${riskLevel}">${result.risk}</div>
    <div class="risk-prob">Probability: ${result.probability}% | Doctor: ${result.doctor}</div>
  `;
  
  // Why HIGH RISK
  const highDiv = document.getElementById('exp-high');
  if (result.why_high_risk && result.why_high_risk.length > 0) {
    highDiv.innerHTML = `
      <h3>⚠️ Why HIGH Risk?</h3>
      <ul class="exp-list">
        ${result.why_high_risk.map(e => `<li>${e}</li>`).join('')}
      </ul>
    `;
  } else {
    highDiv.style.display = 'none';
  }
  
  // Why LOW RISK
  const lowDiv = document.getElementById('exp-low');
  if (result.why_low_risk && result.why_low_risk.length > 0) {
    lowDiv.innerHTML = `
      <h3>✅ Positive Factors</h3>
      <ul class="exp-list">
        ${result.why_low_risk.map(e => `<li>${e}</li>`).join('')}
      </ul>
    `;
  } else {
    lowDiv.style.display = 'none';
  }
  
  // Feature importance
  const featDiv = document.getElementById('features');
  if (result.feature_importance) {
    let html = '';
    result.feature_importance.forEach(f => {
      const pct = Math.min(100, (f.contribution_percent / f.max_weight) * 100);
      html += `
        <div class="feature-item">
          <div class="feature-label">
            <span>${f.feature}</span>
            <span>${f.contribution_percent}% contribution</span>
          </div>
          <div class="feature-bar">
            <div class="feature-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    });
    featDiv.innerHTML = html;
  }
  
  // Suggestions
  const sugDiv = document.getElementById('suggestions');
  if (result.suggestions) {
    sugDiv.innerHTML = `
      <h3>💊 Recommended Actions</h3>
      <ul class="sug-list">
        ${result.suggestions.map(s => `<li>${s}</li>`).join('')}
      </ul>
    `;
  }
  
  // Lifestyle changes
  const lifDiv = document.getElementById('lifestyle');
  if (result.lifestyle_changes && Object.keys(result.lifestyle_changes).length > 0) {
    let html = '<h3>🌿 Lifestyle Changes</h3>';
    for (let [cat, items] of Object.entries(result.lifestyle_changes)) {
      if (Array.isArray(items) && items.length > 0) {
        html += `
          <div class="lifestyle-cat">
            <strong>${cat.charAt(0).toUpperCase() + cat.slice(1)}</strong>
            <ul>
              ${items.map(i => `<li>• ${i}</li>`).join('')}
            </ul>
          </div>
        `;
      }
    }
    lifDiv.innerHTML = html;
  }
  
  // Show result
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({behavior: 'smooth'});
}
</script>
</body>
</html>
